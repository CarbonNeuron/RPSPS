name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: RPSPS
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: RPSPS
          - os: windows-latest
            rid: win-x64
            artifact: RPSPS.exe
          - os: macos-latest
            rid: osx-x64
            artifact: RPSPS
          - os: macos-latest
            rid: osx-arm64
            artifact: RPSPS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish AOT
        run: dotnet publish src/RPSPS -c Release -r ${{ matrix.rid }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd src/RPSPS/bin/Release/net10.0/${{ matrix.rid }}/publish
          tar czf ${{ github.workspace }}/rpsps-${{ matrix.rid }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd src/RPSPS/bin/Release/net10.0/${{ matrix.rid }}/publish
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ github.workspace }}/rpsps-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpsps-${{ matrix.rid }}
          path: |
            rpsps-*.tar.gz
            rpsps-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rpsps-*.tar.gz
            rpsps-*.zip
